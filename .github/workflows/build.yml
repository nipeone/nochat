name: Build Multi-Platform Packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  # Linux DEB
  build-deb:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Publish Linux
        run: |
          dotnet publish NoChat.App/NoChat.App.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishTrimmed=true \
            -p:TrimMode=partial \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:InvariantGlobalization=true \
            -o ./publish/linux

      - name: Prepare DEB structure
        run: |
          mkdir -p ./dist/DEBIAN
          mkdir -p ./dist/usr/lib/nochat
          mkdir -p ./dist/usr/bin
          mkdir -p ./dist/usr/share/applications
          mkdir -p ./dist/usr/share/icons/hicolor/256x256/apps

          cp -r ./publish/linux/* ./dist/usr/lib/nochat/
          chmod +x ./dist/usr/lib/nochat/NoChat
          ln -sf /usr/lib/nochat/NoChat ./dist/usr/bin/nochat

          if [ -f "./NoChat.App/logo.svg" ]; then
            cp ./NoChat.App/logo.svg ./dist/usr/share/icons/hicolor/256x256/apps/nochat.svg
          elif [ -f "./logo.svg" ]; then
            cp ./logo.svg ./dist/usr/share/icons/hicolor/256x256/apps/nochat.svg
          fi

      - name: Create DEBIAN/control
        run: |
          REF_NAME="${{ github.ref_name }}"
          VERSION=$(echo ${REF_NAME#v} | grep -E '^[0-9]' || echo "0.1.0")

          printf "Package: nochat\nVersion: %s\nSection: utils\nPriority: optional\nArchitecture: amd64\nDepends: libgtk-3-0, libgbm1, libnss3, libasound2, libc6\nMaintainer: NoChat Team\nDescription: A cross-platform chat application\n" "$VERSION" > ./dist/DEBIAN/control

      - name: Create desktop entry
        run: |
          echo "[Desktop Entry]" > ./dist/usr/share/applications/nochat.desktop
          echo "Name=NoChat" >> ./dist/usr/share/applications/nochat.desktop
          echo "Comment=A cross-platform chat application" >> ./dist/usr/share/applications/nochat.desktop
          echo "Exec=/usr/bin/nochat" >> ./dist/usr/share/applications/nochat.desktop
          echo "Icon=nochat" >> ./dist/usr/share/applications/nochat.desktop
          echo "Terminal=false" >> ./dist/usr/share/applications/nochat.desktop
          echo "Type=Application" >> ./dist/usr/share/applications/nochat.desktop
          echo "Categories=Network;InstantMessaging;" >> ./dist/usr/share/applications/nochat.desktop
          echo "StartupWMClass=NoChat" >> ./dist/usr/share/applications/nochat.desktop

      - name: Create maintenance scripts
        run: |
          echo "#!/bin/sh" > ./dist/DEBIAN/postinst
          echo "set -e" >> ./dist/DEBIAN/postinst
          echo "chmod +x /usr/lib/nochat/NoChat" >> ./dist/DEBIAN/postinst
          echo "update-desktop-database /usr/share/applications || true" >> ./dist/DEBIAN/postinst
          echo "gtk-update-icon-cache -f -t /usr/share/icons/hicolor || true" >> ./dist/DEBIAN/postinst

          echo "#!/bin/sh" > ./dist/DEBIAN/prerm
          echo "set -e" >> ./dist/DEBIAN/prerm

          chmod 755 ./dist/DEBIAN/postinst ./dist/DEBIAN/prerm

      - name: Build DEB package
        run: |
          sudo chown -R root:root ./dist
          dpkg-deb --build ./dist "NoChat-linux-x64.deb"

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoChat-deb
          path: ./*.deb

      - name: Upload Linux binaries
        uses: actions/upload-artifact@v4
        with:
          name: NoChat-linux-x64
          path: ./publish/linux/

  # Linux RPM
  build-rpm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Install RPM tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Publish Linux
        run: |
          dotnet publish NoChat.App/NoChat.App.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishTrimmed=true \
            -p:TrimMode=partial \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:InvariantGlobalization=true \
            -o ./publish/linux

      - name: Prepare RPM structure
        run: |
          mkdir -p ./rpmbuild/BUILDROOT
          mkdir -p ./rpmbuild/RPMS
          mkdir -p ./rpmbuild/SOURCES
          mkdir -p ./rpmbuild/SPECS
          mkdir -p ./rpmbuild/SRPMS

          # 复制发布文件到 BUILD 目录（rpmbuild 会在这里查找源码）
          cp -r ./publish/linux/* ./rpmbuild/BUILDROOT/nochat-1.0.0/
          cp ./NoChat.App/logo.svg ./rpmbuild/BUILDROOT/nochat-1.0.0/ 2>/dev/null || true

      - name: Create SPEC file
        run: |
          printf 'Name:           nochat\nVersion:        1.0.0\nRelease:        1\nSummary:        A cross-platform chat application\nLicense:        MIT\nURL:            https://github.com/nipeone/nochat\nBuildArch:      x86_64\nRequires:       gtk3, libgbm, nss, alsa-lib, glibc\n\n' > ./rpmbuild/SPECS/nochat.spec

          printf '%%description\nNoChat - A cross-platform chat application\n\n' >> ./rpmbuild/SPECS/nochat.spec
          printf '%%install\nmkdir -p %%{buildroot}/usr/lib/nochat\nmkdir -p %%{buildroot}/usr/bin\nmkdir -p %%{buildroot}/usr/share/applications\nmkdir -p %%{buildroot}/usr/share/icons/hicolor/256x256/apps\ncp -r %%{builddir}/nochat-1.0.0/* %%{buildroot}/usr/lib/nochat/\nchmod +x %%{buildroot}/usr/lib/nochat/NoChat\nln -sf /usr/lib/nochat/NoChat %%{buildroot}/usr/bin/nochat\n\n' >> ./rpmbuild/SPECS/nochat.spec
          printf '%%files\n/usr/lib/nochat/*\n/usr/bin/nochat\n' >> ./rpmbuild/SPECS/nochat.spec

      - name: Build RPM package
        run: |
          rpmbuild -bb ./rpmbuild/SPECS/nochat.spec

      - name: Find RPM file
        run: |
          RPM_FILE=$(find ./rpmbuild/RPMS -name "*.rpm" | head -1)
          echo "RPM_FILE=$RPM_FILE" >> $GITHUB_ENV
          cp "$RPM_FILE" ./NoChat-linux-x64.rpm

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoChat-rpm
          path: ./NoChat-linux-x64.rpm

  # Windows
  build-windows:
    strategy:
      matrix:
        include:
          - platform: win-x64
            artifact: NoChat-win-x64
          - platform: win-arm64
            artifact: NoChat-win-arm64
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Publish Windows
        run: |
          dotnet publish NoChat.App/NoChat.App.csproj `
            -c Release `
            -r ${{ matrix.platform }} `
            --self-contained true `
            -p:PublishTrimmed=true `
            -p:TrimMode=partial `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o ./publish/${{ matrix.platform }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ./publish/${{ matrix.platform }}/

  # macOS
  build-macos:
    strategy:
      matrix:
        include:
          - platform: osx-x64
            artifact: NoChat-macos-x64
          - platform: osx-arm64
            artifact: NoChat-macos-arm64
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Publish macOS
        run: |
          dotnet publish NoChat.App/NoChat.App.csproj \
            -c Release \
            -r ${{ matrix.platform }} \
            --self-contained true \
            -p:PublishTrimmed=true \
            -p:TrimMode=partial \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o ./publish/${{ matrix.platform }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ./publish/${{ matrix.platform }}/

  # Create Release
  create-release:
    needs: [build-deb, build-rpm, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Clean up and prepare packages
        run: |
          # 删除 pdb 和 logo.svg
          find ./artifacts -name "*.pdb" -delete
          find ./artifacts -name "logo.svg" -delete

          # 打包成 zip（GitHub Release 不允许无扩展名文件）
          cd ./artifacts
          zip -r ../NoChat-linux-x64.zip ./NoChat-linux-x64/
          zip -r ../NoChat-win-x64.zip ./NoChat-win-x64/
          zip -r ../NoChat-win-arm64.zip ./NoChat-win-arm64/
          zip -r ../NoChat-macos-x64.zip ./NoChat-macos-x64/
          zip -r ../NoChat-macos-arm64.zip ./NoChat-macos-arm64/
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: NoChat ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ./artifacts/NoChat-deb/*.deb
            ./artifacts/NoChat-rpm/*.rpm
            ./NoChat-linux-x64.zip
            ./NoChat-win-x64.zip
            ./NoChat-win-arm64.zip
            ./NoChat-macos-x64.zip
            ./NoChat-macos-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
